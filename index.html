<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko-Sensei: Visual Japanese</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'sans-serif'; }
        .kanji-card:hover { transform: translateY(-5px); transition: all 0.3s; }
        .particle { color: #facc15; font-weight: bold; } /* Kuning */
        .subject { color: #60a5fa; border-bottom: 2px solid #60a5fa; } /* Biru */
        .verb { color: #f87171; font-weight: bold; } /* Merah */
        .object { color: #4ade80; border-bottom: 2px solid #4ade80; } /* Hijau */
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-black text-indigo-400">NEKO-SENSEI 🐾</h1>
            <p class="text-sm text-slate-400">Target: 1.500 Kosakata (25/hari)</p>
        </div>
        <button onclick="toggleSettings()" class="bg-slate-800 p-2 rounded-full hover:bg-slate-700">⚙️</button>
    </header>

    <main class="max-w-4xl mx-auto space-y-8">
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <div class="flex justify-between mb-2 text-sm">
                <span>Progress Belajar</span>
                <span id="progress-text">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <section>
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">🎯 Target Hari Ini (25 Kata)</h2>
            <div id="kanji-container" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                </div>
        </section>

        <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4">🎨 AI Sentence Architect</h2>
            <p class="text-sm text-slate-400 mb-4">Tulis kalimat Jepangmu, Neko-Sensei akan membedah logikanya.</p>
            <div class="flex gap-2 mb-4">
                <input id="user-input" type="text" placeholder="Contoh: 私 は 日本 に 行きます" 
                       class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none focus:border-indigo-500 text-white">
                <button onclick="checkSentence()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg font-bold">Bedah!</button>
            </div>
            <div id="ai-response" class="min-h-[100px] p-4 bg-slate-900 rounded-lg text-lg leading-relaxed">
                Hasil bedah logika akan muncul di sini...
            </div>
        </section>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-indigo-500 p-8 rounded-3xl max-w-sm w-full">
            <h3 class="text-2xl font-bold mb-4">Neko-Settings</h3>
            <label class="block text-sm text-slate-400 mb-2">Google Gemini API Key:</label>
            <input type="password" id="api-key-input" class="w-full bg-slate-800 p-3 rounded-lg mb-6 border border-slate-700">
            <div class="flex gap-3">
                <button onclick="saveSettings()" class="flex-1 bg-indigo-600 p-3 rounded-xl font-bold">Simpan</button>
                <button onclick="toggleSettings()" class="flex-1 bg-slate-700 p-3 rounded-xl">Tutup</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
