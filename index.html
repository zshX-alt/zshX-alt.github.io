<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N4 Master v2.0</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1c1c1e;
            --accent: #2c2c2e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --success: #32d74b;
            --error: #ff453a;
            --highlight: #0a84ff;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; border-bottom: 1px solid var(--accent);
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px);
            font-size: 13px; letter-spacing: 2px; font-weight: 700; z-index: 100;
        }

        .container { flex: 1; overflow-y: auto; padding: 20px; position: relative; scroll-behavior: smooth; }

        /* Card Section Optimized */
        .vocab-card-container { 
            height: 50vh; perspective: 1500px; position: relative; 
            z-index: 1; margin: 10px 0 30px;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d; will-change: transform;
        }

        .card-inner.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; border: 1px solid var(--accent);
            background: var(--bg-card); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .card-back { transform: rotateY(180deg); background: #252528; }

        .kanji-text { font-size: 72px; margin: 0; font-weight: 700; }
        .reading-text { font-size: 22px; color: var(--text-dim); margin-bottom: 12px; font-weight: 400; }
        .meaning-text { font-size: 30px; font-weight: 800; color: var(--success); text-align: center; line-height: 1.2; }

        /* Action Buttons Optimized */
        .controls {
            position: fixed; bottom: calc(85px + var(--safe-bottom)); 
            left: 0; width: 100%; display: none; padding: 0 20px; 
            gap: 15px; z-index: 999;
        }
        
        .controls.visible { display: flex; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            flex: 1; padding: 18px; border-radius: 18px; border: none;
            font-size: 14px; font-weight: 800; cursor: pointer;
            transition: transform 0.1s active; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.96); }
        
        .btn-again { background: #2c2c2e; color: var(--error); border: 1px solid rgba(255, 69, 58, 0.3); }
        .btn-good { background: var(--success); color: #000; }

        /* Navigation */
        nav {
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; 
            padding: 10px 0 calc(10px + var(--safe-bottom));
            border-top: 1px solid var(--accent); z-index: 1000;
        }
        
        .nav-item { color: var(--text-dim); text-align: center; flex: 1; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; filter: grayscale(1); }
        .nav-item.active .nav-icon { filter: grayscale(0); }

        .hidden { display: none; }
        .progress-fill { height: 100%; background: var(--highlight); transition: width 1s ease-in-out; }
    </style>
</head>
<body>

<header id="header-title">VOCABULARY</header>

<div class="container">
    <div id="sec-vocab">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 11px; font-weight: 700; color: var(--text-dim);">
            <span id="label-day" style="color: var(--highlight)">DAY 1</span>
            <span id="label-count">0 / 25</span>
        </div>
        
        <div class="vocab-card-container">
            <div class="card-inner" id="card" onclick="flip()">
                <div class="card-face card-front">
                    <h1 class="kanji-text" id="d-kanji">---</h1>
                    <p style="margin-top: 50px; color: var(--text-dim); font-size: 10px; letter-spacing: 1px;">TAP TO REVEAL</p>
                </div>
                <div class="card-face card-back">
                    <p class="reading-text" id="d-reading">---</p>
                    <h2 class="meaning-text" id="d-meaning">---</h2>
                </div>
            </div>
        </div>
    </div>

    <div id="sec-grammar" class="hidden">
        <input type="text" class="hidden" id="grammarSearch"> <div id="grammar-list"></div>
    </div>

    <div id="sec-progress" class="hidden">
        <div style="background: var(--bg-card); padding: 25px; border-radius: 20px; border: 1px solid var(--accent);">
            <p style="font-size: 12px; color: var(--text-dim); margin: 0 0 15px;">TOTAL MASTERY</p>
            <div style="background: var(--accent); height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 10px;">
                <div id="bar-v" class="progress-fill"></div>
            </div>
            <p id="stat-v" style="font-size: 16px; font-weight: 700; margin: 0;">0 / 1500 Kata</p>
        </div>
    </div>
</div>

<div class="controls" id="card-controls">
    <button class="btn btn-again" onclick="handleResult(false)">Again</button>
    <button class="btn btn-good" onclick="handleResult(true)">Good</button>
</div>

<nav>
    <div class="nav-item active" id="n-vocab" onclick="switchPage('vocab')">
        <span class="nav-icon">🗂️</span>VOCAB
    </div>
    <div class="nav-item" id="n-grammar" onclick="switchPage('grammar')">
        <span class="nav-icon">📖</span>GRAMMAR
    </div>
    <div class="nav-item" id="n-progress" onclick="switchPage('progress')">
        <span class="nav-icon">📊</span>STATS
    </div>
</nav>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
