<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N4 Study Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JLPT N4 Progress</h1>
            <p>Klik pada kartu untuk menandai materi yang sudah dikuasai.</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Kosakata (語彙)</h3>
                <div class="progress-info"><span id="goi-count">0</span> / 1500</div>
                <div class="progress-bar"><div id="goi-progress" class="fill"></div></div>
            </div>
            <div class="card">
                <h3>Kanji (漢字)</h3>
                <div class="progress-info"><span id="kanji-count">0</span> / 300</div>
                <div class="progress-bar"><div id="kanji-progress" class="fill"></div></div>
            </div>
        </div>

        <section class="list-section">
            <div class="tabs">
                <button id="btn-kanji" class="active" onclick="switchTab('kanji')">Daftar Kanji</button>
                <button id="btn-vocab" onclick="switchTab('vocabulary')">Daftar Kosakata</button>
            </div>

            <div id="item-list" class="item-list"></div>
        </section>

        <footer>
            <button class="btn-reset" onclick="resetProgress()">Reset Semua Progres</button>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
