<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master JLPT Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Master JLPT Hub</h1>

    <div class="table-container">
        <table>
            <thead><tr><th>Bentuk</th><th>Kaku (G1)</th><th>Taberu (G2)</th></tr></thead>
            <tbody>
                <tr><td>Kamus</td><td>Kaku</td><td>Taberu</td></tr>
                <tr><td>Masu</td><td>Kakimasu</td><td>Tabemasu</td></tr>
                <tr><td>Te-Form</td><td>Kaite</td><td>Tabete</td></tr>
                <tr><td>Ta-Form</td><td>Kaita</td><td>Tabeta</td></tr>
                <tr><td>Potensial</td><td>Kakeru</td><td>Taberareru</td></tr>
            </tbody>
        </table>
    </div>

    <div id="app"></div>

    <script src="data.js"></script>
    <script>
        const app = document.getElementById('app');
        for (const [cat, items] of Object.entries(JLPT_Data)) {
            app.innerHTML += `<h2 class="section-header">${cat}</h2>`;
            items.forEach(item => {
                app.innerHTML += `
                    <div class="materi-card">
                        <div style="font-weight:600; color:#cbd5e1; margin-bottom:8px;">${item.jdl}</div>
                        <div class="jp-kanji">${item.jepang}</div>
                        <div class="jp-kana">${item.baca}</div>
                        <div class="meaning">${item.arti}</div>
                        <div class="explanation"><b>Rumus:</b> ${item.pen}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
