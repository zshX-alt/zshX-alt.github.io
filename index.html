<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko-Sensei | Visual Japanese Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .subject { color: #60a5fa; border-bottom: 2px solid #60a5fa; font-weight: bold; }
        .particle { color: #facc15; font-weight: bold; padding: 0 2px; }
        .object { color: #4ade80; border-bottom: 2px solid #4ade80; font-weight: bold; }
        .verb { color: #f87171; font-weight: bold; }
        .kanji-card { transition: all 0.2s; }
        .kanji-card:hover { transform: translateY(-4px); border-color: #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-5xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black text-indigo-500 tracking-tighter">NEKO-SENSEI 🐾</h1>
            <p class="text-slate-400">Target: 1500 Kosakata (25/Hari)</p>
        </div>
        <button onclick="toggleSettings()" class="bg-slate-800 p-3 rounded-2xl hover:bg-slate-700 border border-slate-700">⚙️ Settings</button>
    </header>

    <main class="max-w-5xl mx-auto space-y-8">
        <section class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
            <div class="flex justify-between items-end mb-4">
                <span class="text-sm font-bold text-slate-500 uppercase">Mastery Progress</span>
                <span id="progress-text" class="text-2xl font-black text-white">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-900 h-4 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-full w-0 transition-all duration-1000"></div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">🎯 Hari Ini</h2>
                <button onclick="studyNextBatch()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl font-bold transition">Ambil 25 Kata Baru</button>
            </div>
            <div id="vocab-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>

        <section class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-2">🎨 AI Sentence Architect</h2>
            <div class="flex gap-2 mb-4">
                <input id="ai-input" type="text" placeholder="Tulis kalimat JPN di sini..." class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 text-lg">
                <button onclick="analyzeSentence()" class="bg-indigo-600 px-8 rounded-xl font-bold">BEDAH</button>
            </div>
            <div id="ai-output" class="bg-slate-950 p-6 rounded-2xl min-h-[100px] border border-slate-800 text-xl leading-relaxed"></div>
        </section>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-indigo-500 p-8 rounded-3xl max-w-sm w-full">
            <h3 class="text-2xl font-bold mb-4 text-white">API Settings</h3>
            <input type="password" id="api-key-input" placeholder="OpenAI API Key (sk-...)" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white mb-6">
            <button onclick="saveSettings()" class="w-full bg-indigo-600 p-4 rounded-xl font-bold text-white mb-2">SIMPAN</button>
            <button onclick="toggleSettings()" class="w-full text-slate-500">Batal</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
