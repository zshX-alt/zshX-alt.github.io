<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | Firmansyah Cahya Maulud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warna Deep Dark dengan aksen Cyan */
            --bg-color: #0a0a0a;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* --- ANIMASI BACKGROUND BERGERAK --- */
        body {
            background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- CONTAINER UTAMA (EFEK KACA/GLASSMORPHISM) --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .info {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* --- TOMBOL WHATSAPP BERCAHAYA --- */
        .btn-wa {
            display: inline-block;
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.6);
        }

        /* Dekorasi Lingkungan Bergerak Kecil */
        .blob {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--accent);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <h1>Firmansyah Cahya Maulud</h1>
        <p>Web Developer</p>
        
        <div class="info">
            📍 Kec. Banjarwangi, Kab. Garut, Jawa Barat<br>
            📱 083155628959
        </div>

        <a href="https://wa.me/6283155628959" class="btn-wa">
            Chat WhatsApp
        </a>
    </div>

    <p style="margin-top: 20px; font-size: 0.7rem; color: #555;">
        &copy; 2026 Firmansyah. Built with HTML/CSS.
    </p>

</body>
</html>
