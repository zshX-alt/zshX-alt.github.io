<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Learning Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .materi-card { transition: all 0.2s; border-left: 5px solid #6366f1; }
        .materi-card:hover { transform: translateX(5px); background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-12 border-b-2 pb-6">
            <h1 class="text-5xl font-black text-gray-800 tracking-tighter text-center">HOME</h1>
            <p class="text-center text-gray-500 mt-2 italic font-medium">Kitab Suci Persiapan JLPT N5 & N4</p>
        </header>

        <div id="content" class="space-y-12"></div>
    </div>

    <script src="data.js"></script>
    <script>
        const contentDiv = document.getElementById('content');
        
        for (const [section, items] of Object.entries(JLPT_Data)) {
            let sectionHtml = `
                <section>
                    <h2 class="text-3xl font-extrabold text-indigo-600 mb-6 flex items-center">
                        <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg mr-3 text-sm italic">Folder</span>
                        ${section}
                    </h2>
                    <div class="grid gap-4">
            `;

            items.forEach(item => {
                sectionHtml += `
                    <div class="materi-card bg-white p-6 rounded-xl shadow-sm">
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${item.jdl}</h3>
                        <div class="text-gray-600 leading-relaxed text-base">
                            ${item.pen}
                        </div>
                    </div>
                `;
            });

            sectionHtml += `</div></section>`;
            contentDiv.innerHTML += sectionHtml;
        }
    </script>
</body>
</html>
