<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Master - 50 Bab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <h1>Nihongo Pro</h1>
            <p class="subtitle">Mastering Minna no Nihongo (50 Bab)</p>
        </header>

        <div class="chapter-grid" id="menu-container">
            </div>
    </div>

    <script>
        const container = document.getElementById('menu-container');
        // Loop buat bikin 50 tombol otomatis
        for (let i = 1; i <= 50; i++) {
            const card = document.createElement('a');
            card.href = `template.html?bab=${i}`;
            card.className = 'chapter-card';
            card.innerHTML = `
                <span class="chapter-number">${i}</span>
                <span class="chapter-label">第${i}課</span>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
