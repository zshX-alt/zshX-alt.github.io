<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>NIHONGO PRO</h1>
        <p>1 - 50 + SUPER KANJI</p>
    </header>
    <div id="bab-list"></div>
    <script>
        const container = document.getElementById('bab-list');
        for (let i = 1; i <= 52; i++) {
            const card = document.createElement('a');
            card.href = `template.html?bab=${i}`;
            card.className = i >= 51 ? 'bab-card special' : 'bab-card';
            card.innerHTML = `<span class="number">${i}</span><span class="label">第${i}課</span>`;
            container.appendChild(card);
        }
    </script>
</body>
</html>
